name: erpsynch_app
description: P2P Obsidian vault sync for Android
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.0.0
  yaml: ^3.1.0
  web_socket_channel: ^2.4.0
  flutter_webrtc: ^0.9.0
  flutter_markdown: ^0.6.0
  path_provider: ^2.1.0
  workmanager: ^0.5.0
  crypto: ^3.0.0
  file_picker: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/config.yaml
