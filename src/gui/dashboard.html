<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ErpSynch Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f1117; color: #e1e4e8; padding: 2rem;
  }
  h1 { font-size: 1.5rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem; }
  h1 span { color: #58a6ff; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1.25rem; }
  .card-label { font-size: 0.8rem; color: #8b949e; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
  .card-value { font-size: 1.75rem; font-weight: 600; }
  .card-value.green { color: #3fb950; }
  .card-value.yellow { color: #d29922; }
  .card-value.red { color: #f85149; }
  .card-value.blue { color: #58a6ff; }
  .btn {
    background: #238636; color: #fff; border: none; border-radius: 6px;
    padding: 0.75rem 1.5rem; font-size: 1rem; cursor: pointer;
  }
  .btn:hover { background: #2ea043; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-sm { padding: 0.4rem 1rem; font-size: 0.85rem; }
  .btn-warn { background: #d29922; }
  .btn-warn:hover { background: #e3b341; }
  .section-title { font-size: 1rem; margin-bottom: 0.75rem; color: #8b949e; border-bottom: 1px solid #21262d; padding-bottom: 0.5rem; }
  .log-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  .log-table th { text-align: left; padding: 0.5rem; border-bottom: 1px solid #30363d; color: #8b949e; }
  .log-table td { padding: 0.5rem; border-bottom: 1px solid #21262d; }
  .log-type { display: inline-block; padding: 0.1rem 0.4rem; border-radius: 4px; font-size: 0.75rem; }
  .log-type.sync { background: #1a3a2a; color: #3fb950; }
  .log-type.error { background: #3a1a1a; color: #f85149; }
  .log-type.conflict { background: #3a2a1a; color: #d29922; }
  .log-type.info { background: #1a2a3a; color: #58a6ff; }
  .config-box { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 1rem; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.8rem; margin-top: 1rem; }
  .config-row { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem; }
  .config-row label { min-width: 140px; color: #8b949e; font-size: 0.85rem; }
  .config-row input, .config-row select {
    flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 4px;
    padding: 0.4rem 0.6rem; color: #e1e4e8; font-size: 0.85rem; font-family: 'SF Mono', monospace;
  }
  .config-row input:focus { border-color: #58a6ff; outline: none; }
  .tabs { display: flex; gap: 0; margin-bottom: 1rem; border-bottom: 1px solid #30363d; }
  .tab { padding: 0.6rem 1.2rem; cursor: pointer; color: #8b949e; border-bottom: 2px solid transparent; }
  .tab:hover { color: #e1e4e8; }
  .tab.active { color: #58a6ff; border-bottom-color: #58a6ff; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .toast { position: fixed; bottom: 2rem; right: 2rem; background: #238636; color: #fff; padding: 0.75rem 1.5rem; border-radius: 6px; font-size: 0.85rem; opacity: 0; transition: opacity 0.3s; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
  <h1><span>⬡</span> ErpSynch Dashboard</h1>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('status')" id="tab-status">Status</div>
    <div class="tab" onclick="switchTab('config')" id="tab-config">Config</div>
  </div>

  <div class="tab-content active" id="panel-status">
    <div class="cards">
      <div class="card">
        <div class="card-label">Status</div>
        <div class="card-value green" id="status-value">Starting...</div>
      </div>
      <div class="card">
        <div class="card-label">Peer Connection</div>
        <div class="card-value yellow" id="peer-value">Waiting...</div>
      </div>
      <div class="card">
        <div class="card-label">Pending Files</div>
        <div class="card-value blue" id="pending-value">0</div>
      </div>
      <div class="card">
        <div class="card-label">Actions</div>
        <button class="btn" id="sync-btn" onclick="triggerSync()">Sync Now</button>
      </div>
    </div>

    <div class="section-title">Recent Sync Log</div>
    <table class="log-table">
      <thead><tr><th>Time</th><th>Type</th><th>Message</th></tr></thead>
      <tbody id="log-body"></tbody>
    </table>
  </div>

  <div class="tab-content" id="panel-config">
    <div class="section-title">Profile</div>
    <div class="config-box">
      <div class="config-row" id="profile-row">
        <label>Active Profile</label>
        <select id="profile-select" onchange="switchProfile(this.value)"></select>
      </div>
    </div>

    <div class="section-title" style="margin-top:1.5rem">Peer</div>
    <div class="config-box">
      <div class="config-row">
        <label>Peer ID</label>
        <input id="cfg-peer-id" placeholder="work-pc">
      </div>
      <div class="config-row">
        <label>Host / IP</label>
        <input id="cfg-host" placeholder="192.168.1.10">
      </div>
      <div class="config-row">
        <label>Port</label>
        <input id="cfg-port" placeholder="9001">
      </div>
    </div>

    <div class="section-title" style="margin-top:1.5rem">Vault</div>
    <div class="config-box">
      <div class="config-row">
        <label>Local Path</label>
        <input id="cfg-local-path" placeholder="C:\Users\...\Obsidian">
      </div>
      <div class="config-row">
        <label>Sync To (remote)</label>
        <input id="cfg-sync-to" placeholder="D:\...\Obsidian">
      </div>
      <div class="config-row">
        <label>Include AI Config</label>
        <select id="cfg-ai-config"><option value="true">Yes</option><option value="false">No</option></select>
      </div>
    </div>

    <div class="section-title" style="margin-top:1.5rem">Sync Settings</div>
    <div class="config-box">
      <div class="config-row">
        <label>Auto Sync</label>
        <select id="cfg-auto"><option value="true">On</option><option value="false">Off</option></select>
      </div>
      <div class="config-row">
        <label>Interval (seconds)</label>
        <input id="cfg-interval" placeholder="30">
      </div>
    </div>

    <div style="margin-top:1rem; display:flex; gap:0.75rem">
      <button class="btn btn-sm" onclick="saveConfig()">Save Config</button>
      <button class="btn btn-sm btn-warn" onclick="addProfile()">+ New Profile</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let currentConfig = null;
    let ws;

    function toast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }

    function switchTab(name) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(p => p.classList.remove('active'));
      document.getElementById(`tab-${name}`).classList.add('active');
      document.getElementById(`panel-${name}`).classList.add('active');
      if (name === 'config') loadConfigToUI();
    }

    function connectWs() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}/ws`);
      ws.onmessage = (e) => { const m = JSON.parse(e.data); if (m.type === 'log') addLogRow(m.data); };
      ws.onclose = () => setTimeout(connectWs, 3000);
    }

    function addLogRow(entry) {
      const tbody = document.getElementById('log-body');
      const tr = document.createElement('tr');
      const time = new Date(entry.time).toLocaleTimeString();
      tr.innerHTML = `<td>${time}</td><td><span class="log-type ${entry.type}">${entry.type}</span></td><td>${esc(entry.message)}</td>`;
      tbody.prepend(tr);
      while (tbody.children.length > 50) tbody.removeChild(tbody.lastChild);
    }

    function esc(s) { return s.replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[m]); }

    async function fetchStatus() {
      try {
        const res = await fetch('/api/status');
        const data = await res.json();
        document.getElementById('status-value').textContent = data.running ? 'Running' : 'Stopped';
        document.getElementById('status-value').className = 'card-value ' + (data.running ? 'green' : 'red');
        document.getElementById('peer-value').textContent = data.connected ? 'Connected' : 'Disconnected';
        document.getElementById('peer-value').className = 'card-value ' + (data.connected ? 'green' : 'yellow');
        document.getElementById('pending-value').textContent = data.pendingCount;
        document.getElementById('sync-btn').disabled = false;
        const tbody = document.getElementById('log-body');
        tbody.innerHTML = '';
        data.logs.forEach(addLogRow);
      } catch {}
    }

    async function triggerSync() {
      const btn = document.getElementById('sync-btn');
      btn.disabled = true; btn.textContent = 'Syncing...';
      try { await fetch('/api/sync', { method: 'POST' }); } catch {}
      setTimeout(() => { btn.disabled = false; btn.textContent = 'Sync Now'; }, 2000);
    }

    async function loadConfigToUI() {
      try {
        const res = await fetch('/api/config');
        const cfg = await res.json();
        currentConfig = cfg;

        const sel = document.getElementById('profile-select');
        if (cfg.profiles && cfg.profiles.length > 0) {
          sel.innerHTML = cfg.profiles.map(p => `<option value="${p.name}" ${p.name === cfg.activeProfile ? 'selected' : ''}>${p.name}</option>`).join('');
          document.getElementById('profile-row').style.display = '';
          const active = cfg.profiles.find(p => p.name === cfg.activeProfile);
          if (active && active.peers[0]) {
            document.getElementById('cfg-peer-id').value = active.peers[0].id || '';
            document.getElementById('cfg-host').value = active.peers[0].host || '';
            document.getElementById('cfg-port').value = active.peers[0].port || '';
          }
        } else if (cfg.peers && cfg.peers[0]) {
          document.getElementById('profile-row').style.display = 'none';
          document.getElementById('cfg-peer-id').value = cfg.peers[0].id || '';
          document.getElementById('cfg-host').value = cfg.peers[0].host || '';
          document.getElementById('cfg-port').value = cfg.peers[0].port || '';
        }

        const v = cfg.vaults && cfg.vaults[0];
        if (v) {
          document.getElementById('cfg-local-path').value = v.localPath || '';
          document.getElementById('cfg-sync-to').value = v.syncTo || '';
          document.getElementById('cfg-ai-config').value = v.includeAiConfig ? 'true' : 'false';
        }
        document.getElementById('cfg-auto').value = cfg.sync?.auto ? 'true' : 'false';
        document.getElementById('cfg-interval').value = cfg.sync?.intervalSeconds || 30;
      } catch {}
    }

    async function saveConfig() {
      const update = {};
      if (currentConfig.profiles && currentConfig.profiles.length > 0) {
        const profile = currentConfig.profiles.find(p => p.name === currentConfig.activeProfile) || currentConfig.profiles[0];
        profile.peers = [{
          id: document.getElementById('cfg-peer-id').value,
          host: document.getElementById('cfg-host').value,
          port: parseInt(document.getElementById('cfg-port').value) || 9001,
        }];
        update.profiles = currentConfig.profiles;
      } else {
        update.peers = [{
          id: document.getElementById('cfg-peer-id').value,
          host: document.getElementById('cfg-host').value,
          port: parseInt(document.getElementById('cfg-port').value) || 9001,
        }];
      }
      const v = {
        localPath: document.getElementById('cfg-local-path').value,
        syncTo: document.getElementById('cfg-sync-to').value,
        includeAiConfig: document.getElementById('cfg-ai-config').value === 'true',
      };
      if (currentConfig.vaults && currentConfig.vaults[0]) {
        Object.assign(currentConfig.vaults[0], v);
        update.vaults = currentConfig.vaults;
      } else {
        update.vaults = [v];
      }
      update.sync = {
        auto: document.getElementById('cfg-auto').value === 'true',
        intervalSeconds: parseInt(document.getElementById('cfg-interval').value) || 30,
        conflict: 'last-write-wins',
        encryption: 'none',
      };
      try {
        await fetch('/api/config', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(update) });
        toast('Config saved! Restart the agent for changes to take effect.');
      } catch { toast('Failed to save config'); }
    }

    async function switchProfile(name) {
      try {
        await fetch('/api/profile', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name }) });
        toast(`Switched to profile: ${name}. Restart agent to use new peer settings.`);
        loadConfigToUI();
      } catch { toast('Failed to switch profile'); }
    }

    function addProfile() {
      const name = prompt('New profile name:');
      if (!name) return;
      if (!currentConfig.profiles) currentConfig.profiles = [];
      currentConfig.profiles.push({ name, peers: [{ id: name, host: '', port: 9001 }] });
      currentConfig.activeProfile = name;
      saveConfig().then(() => loadConfigToUI());
    }

    fetchStatus();
    setInterval(fetchStatus, 3000);
    connectWs();
  </script>
</body>
</html>
