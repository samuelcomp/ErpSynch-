<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ErpSynch Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f1117; color: #e1e4e8; padding: 2rem;
  }
  h1 { font-size: 1.5rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem; }
  h1 span { color: #58a6ff; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
  .card {
    background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1.25rem;
  }
  .card-label { font-size: 0.8rem; color: #8b949e; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
  .card-value { font-size: 1.75rem; font-weight: 600; }
  .card-value.green { color: #3fb950; }
  .card-value.yellow { color: #d29922; }
  .card-value.red { color: #f85149; }
  .card-value.blue { color: #58a6ff; }
  .btn {
    background: #238636; color: #fff; border: none; border-radius: 6px;
    padding: 0.75rem 1.5rem; font-size: 1rem; cursor: pointer; width: 100%;
  }
  .btn:hover { background: #2ea043; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .section-title { font-size: 1rem; margin-bottom: 0.75rem; color: #8b949e; }
  .log-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  .log-table th { text-align: left; padding: 0.5rem; border-bottom: 1px solid #30363d; color: #8b949e; }
  .log-table td { padding: 0.5rem; border-bottom: 1px solid #21262d; }
  .log-type { display: inline-block; padding: 0.1rem 0.4rem; border-radius: 4px; font-size: 0.75rem; }
  .log-type.sync { background: #1a3a2a; color: #3fb950; }
  .log-type.error { background: #3a1a1a; color: #f85149; }
  .log-type.conflict { background: #3a2a1a; color: #d29922; }
  .log-type.info { background: #1a2a3a; color: #58a6ff; }
  .config-box {
    background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
    padding: 1rem; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.8rem;
    white-space: pre-wrap; margin-top: 1rem; max-height: 200px; overflow-y: auto;
  }
</style>
</head>
<body>
  <h1><span>⬡</span> ErpSynch Dashboard</h1>

  <div class="cards">
    <div class="card">
      <div class="card-label">Status</div>
      <div class="card-value green" id="status-value">Starting...</div>
    </div>
    <div class="card">
      <div class="card-label">Peer Connection</div>
      <div class="card-value yellow" id="peer-value">Waiting...</div>
    </div>
    <div class="card">
      <div class="card-label">Pending Files</div>
      <div class="card-value blue" id="pending-value">0</div>
    </div>
    <div class="card">
      <div class="card-label">Actions</div>
      <button class="btn" id="sync-btn" onclick="triggerSync()">Sync Now</button>
    </div>
  </div>

  <div class="section-title">Recent Sync Log</div>
  <table class="log-table">
    <thead><tr><th>Time</th><th>Type</th><th>Message</th></tr></thead>
    <tbody id="log-body"></tbody>
  </table>

  <script>
    let ws;

    function connectWs() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}/ws`);
      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'log') addLogRow(msg.data);
      };
      ws.onclose = () => setTimeout(connectWs, 3000);
    }

    function addLogRow(entry) {
      const tbody = document.getElementById('log-body');
      const tr = document.createElement('tr');
      const time = new Date(entry.time).toLocaleTimeString();
      tr.innerHTML = `
        <td>${time}</td>
        <td><span class="log-type ${entry.type}">${entry.type}</span></td>
        <td>${esc(entry.message)}</td>
      `;
      tbody.prepend(tr);
      while (tbody.children.length > 50) tbody.removeChild(tbody.lastChild);
    }

    function esc(s) { return s.replace(/[&<>"]/g, function(m) { return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]; }); }

    async function fetchStatus() {
      try {
        const res = await fetch('/api/status');
        const data = await res.json();
        document.getElementById('status-value').textContent = data.running ? 'Running' : 'Stopped';
        document.getElementById('status-value').className = 'card-value ' + (data.running ? 'green' : 'red');
        document.getElementById('peer-value').textContent = data.connected ? 'Connected' : 'Disconnected';
        document.getElementById('peer-value').className = 'card-value ' + (data.connected ? 'green' : 'yellow');
        document.getElementById('pending-value').textContent = data.pendingCount;
        document.getElementById('sync-btn').disabled = false;

        const tbody = document.getElementById('log-body');
        tbody.innerHTML = '';
        data.logs.forEach(addLogRow);
      } catch {}
    }

    async function triggerSync() {
      const btn = document.getElementById('sync-btn');
      btn.disabled = true; btn.textContent = 'Syncing...';
      try {
        await fetch('/api/sync', { method: 'POST' });
      } catch {}
      setTimeout(() => { btn.disabled = false; btn.textContent = 'Sync Now'; }, 2000);
    }

    fetchStatus();
    setInterval(fetchStatus, 3000);
    connectWs();
  </script>
</body>
</html>
