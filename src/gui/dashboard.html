<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ErpSynch</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0c10; color: #e1e4e8;
  }
  .sidebar {
    position: fixed; left: 0; top: 0; bottom: 0; width: 220px;
    background: #0d1117; border-right: 1px solid #21262d;
    padding: 24px 0; display: flex; flex-direction: column;
  }
  .sidebar-brand {
    padding: 0 20px 24px; font-size: 18px; font-weight: 700;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid #21262d;
  }
  .sidebar-brand span { color: #58a6ff; }
  .nav-item {
    padding: 12px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px;
    color: #8b949e; font-size: 14px; transition: all .15s;
    border-left: 3px solid transparent;
  }
  .nav-item:hover { color: #e1e4e8; background: #161b22; }
  .nav-item.active { color: #58a6ff; background: #161b22; border-left-color: #58a6ff; }
  .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
  .main { margin-left: 220px; padding: 28px 32px; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .card {
    background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 20px;
    transition: border-color .2s;
  }
  .card:hover { border-color: #58a6ff33; }
  .card-label { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
  .card-value { font-size: 28px; font-weight: 700; }
  .card-value.green { color: #3fb950; }
  .card-value.yellow { color: #d29922; }
  .card-value.red { color: #f85149; }
  .card-value.blue { color: #58a6ff; }
  .btn {
    background: #238636; color: #fff; border: none; border-radius: 8px;
    padding: 10px 20px; font-size: 14px; cursor: pointer; font-weight: 500;
    display: inline-flex; align-items: center; gap: 6px; transition: background .15s;
  }
  .btn:hover { background: #2ea043; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn-warn { background: #d29922; }
  .btn-warn:hover { background: #e3b341; }

  .graph-container {
    position: relative; background: #0d1117; border: 1px solid #30363d;
    border-radius: 10px; overflow: hidden; height: 600px;
  }
  .graph-container canvas { display: block; width: 100%; height: 100%; cursor: grab; }
  .graph-container canvas:active { cursor: grabbing; }
  .graph-tooltip {
    position: absolute; display: none;
    background: #1c2333; border: 1px solid #30363d; border-radius: 8px;
    padding: 8px 12px; font-size: 13px; pointer-events: none;
    box-shadow: 0 4px 16px rgba(0,0,0,.4); z-index: 10;
  }

  .panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .panel-header h3 { font-size: 15px; font-weight: 600; }
  .log-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .log-table th { text-align: left; padding: 10px 12px; border-bottom: 1px solid #30363d; color: #8b949e; font-weight: 500; }
  .log-table td { padding: 8px 12px; border-bottom: 1px solid #21262d; }
  .log-type { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .log-type.sync { background: #1a3a2a; color: #3fb950; }
  .log-type.error { background: #3a1a1a; color: #f85149; }
  .log-type.conflict { background: #3a2a1a; color: #d29922; }
  .log-type.info { background: #1a2a3a; color: #58a6ff; }

  .panel { display: none; }
  .panel.active { display: block; }

  .config-box { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-top: 12px; }
  .config-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .config-row:last-child { margin-bottom: 0; }
  .config-row label { min-width: 140px; color: #8b949e; font-size: 13px; }
  .config-row input, .config-row select {
    flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
    padding: 8px 10px; color: #e1e4e8; font-size: 13px;
  }
  .config-row input:focus { border-color: #58a6ff; outline: none; }
  .config-row input[readonly] { opacity: .7; }

  .section-title { font-size: 13px; font-weight: 600; color: #8b949e; margin-top: 20px; margin-bottom: 4px; }
  .section-title:first-child { margin-top: 0; }

  .toast {
    position: fixed; bottom: 24px; right: 24px; background: #238636; color: #fff;
    padding: 12px 20px; border-radius: 8px; font-size: 13px; opacity: 0;
    transition: opacity .3s; box-shadow: 0 4px 12px rgba(0,0,0,.3); z-index: 100;
  }
  .toast.show { opacity: 1; }

  .graph-empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; color: #8b949e; gap: 12px;
  }
  .graph-empty svg { width: 48px; height: 48px; stroke: #30363d; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-brand"><span>&#9673;</span> ErpSynch</div>
  <div class="nav-item active" onclick="switchPanel('status')" id="nav-status">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M22 12a10 10 0 1 1-20 0 10 10 0 0 1 20 0z"/></svg>
    Status
  </div>
  <div class="nav-item" onclick="switchPanel('graph')" id="nav-graph">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6a2 2 0 1 0 0-4 2 2 0 0 0 0 4zM6 12a2 2 0 1 0 0-4 2 2 0 0 0 0 4z"/><path d="M18 6h-3a5 5 0 0 0-5 5v2"/><path d="M18 22a2 2 0 1 0 0-4 2 2 0 0 0 0 4z"/></svg>
    Graph
  </div>
  <div class="nav-item" onclick="switchPanel('config')" id="nav-config">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    Settings
  </div>
</div>

<div class="main">
  <!-- Status Panel -->
  <div class="panel active" id="panel-status">
    <div style="margin-bottom: 24px;">
      <h2 style="font-size: 20px; font-weight: 600;">Dashboard</h2>
    </div>
    <div class="cards">
      <div class="card">
        <div class="card-label">Sync Engine</div>
        <div class="card-value green" id="status-value">Running</div>
      </div>
      <div class="card">
        <div class="card-label">Peer</div>
        <div class="card-value yellow" id="peer-value">Disconnected</div>
      </div>
      <div class="card">
        <div class="card-label">Pending</div>
        <div class="card-value blue" id="pending-value">0</div>
      </div>
      <div class="card">
        <div class="card-label">Notes</div>
        <div class="card-value blue" id="notes-value">0</div>
      </div>
    </div>
    <button class="btn" id="sync-btn" onclick="triggerSync()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M21 2v6h-6M3 22v-6h6"/><path d="M21 8a10 10 0 0 0-17.3-4.7M3 16a10 10 0 0 0 17.3 4.7"/></svg>
      Sync Now
    </button>
    <div style="margin-top: 28px;">
      <div class="panel-header"><h3>Sync Log</h3></div>
      <table class="log-table">
        <thead><tr><th>Time</th><th>Type</th><th>Message</th></tr></thead>
        <tbody id="log-body"></tbody>
      </table>
    </div>
  </div>

  <!-- Graph Panel -->
  <div class="panel" id="panel-graph">
    <div style="margin-bottom: 16px;">
      <h2 style="font-size: 20px; font-weight: 600;">Note Graph</h2>
      <p style="color: #8b949e; font-size: 13px; margin-top: 4px;">Wiki-link connections between your notes</p>
    </div>
    <div class="graph-container" id="graph-container">
      <canvas id="graph-canvas"></canvas>
      <div class="graph-tooltip" id="graph-tooltip"></div>
    </div>
  </div>

  <!-- Config Panel -->
  <div class="panel" id="panel-config">
    <div style="margin-bottom: 24px;">
      <h2 style="font-size: 20px; font-weight: 600;">Settings</h2>
    </div>

    <div class="section-title">Profile</div>
    <div class="config-box" id="profile-section">
      <div class="config-row">
        <label>Active Profile</label>
        <select id="profile-select" onchange="switchProfile(this.value)"></select>
      </div>
    </div>

    <div class="section-title">Peer Connection</div>
    <div class="config-box">
      <div class="config-row">
        <label>Peer ID</label>
        <input id="cfg-peer-id" placeholder="work-pc">
      </div>
      <div class="config-row">
        <label>Host / IP</label>
        <input id="cfg-host" placeholder="192.168.1.10">
      </div>
      <div class="config-row">
        <label>Port</label>
        <input id="cfg-port" placeholder="9001">
      </div>
    </div>

    <div class="section-title">Vault</div>
    <div class="config-box">
      <div class="config-row">
        <label>Local Path</label>
        <input id="cfg-local-path" placeholder="C:\Users\...\Obsidian">
      </div>
      <div class="config-row">
        <label>Sync To (remote)</label>
        <input id="cfg-sync-to" placeholder="D:\...\Obsidian">
      </div>
      <div class="config-row">
        <label>Include AI Config</label>
        <select id="cfg-ai-config"><option value="true">Yes</option><option value="false">No</option></select>
      </div>
    </div>

    <div class="section-title">Sync</div>
    <div class="config-box">
      <div class="config-row">
        <label>Auto Sync</label>
        <select id="cfg-auto"><option value="true">On</option><option value="false">Off</option></select>
      </div>
      <div class="config-row">
        <label>Interval (seconds)</label>
        <input id="cfg-interval" placeholder="30">
      </div>
    </div>

    <div style="margin-top: 20px; display: flex; gap: 12px">
      <button class="btn" onclick="saveConfig()">Save</button>
      <button class="btn btn-warn" onclick="addProfile()">+ New Profile</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let currentConfig = null;
let ws;
let graphData = null;
let graphAnimId = null;

// ─── Toast ──────────────────────────────────────────
function toast(msg, err) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  t.style.background = err ? '#da3633' : '#238636';
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ─── Panels ─────────────────────────────────────────
function switchPanel(name) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`nav-${name}`).classList.add('active');
  document.getElementById(`panel-${name}`).classList.add('active');
  if (name === 'graph') initGraph();
  if (name === 'config') loadConfigToUI();
}

// ─── WebSocket ──────────────────────────────────────
function connectWs() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);
  ws.onmessage = e => { const m = JSON.parse(e.data); if (m.type === 'log') addLogRow(m.data); };
  ws.onclose = () => setTimeout(connectWs, 3000);
}

// ─── Log ────────────────────────────────────────────
function addLogRow(entry) {
  const tbody = document.getElementById('log-body');
  const tr = document.createElement('tr');
  tr.innerHTML = `<td style="color:#8b949e">${new Date(entry.time).toLocaleTimeString()}</td><td><span class="log-type ${entry.type}">${entry.type}</span></td><td>${esc(entry.message)}</td>`;
  tbody.prepend(tr);
  while (tbody.children.length > 100) tbody.removeChild(tbody.lastChild);
}
function esc(s) { return s.replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[m]); }

// ─── Status ─────────────────────────────────────────
async function fetchStatus() {
  try {
    const res = await fetch('/api/status');
    const d = await res.json();
    document.getElementById('status-value').textContent = d.running ? 'Running' : 'Stopped';
    document.getElementById('status-value').className = 'card-value ' + (d.running ? 'green' : 'red');
    document.getElementById('peer-value').textContent = d.connected ? 'Connected' : 'Disconnected';
    document.getElementById('peer-value').className = 'card-value ' + (d.connected ? 'green' : 'yellow');
    document.getElementById('pending-value').textContent = d.pendingCount;
    document.getElementById('sync-btn').disabled = !d.running;
    const tbody = document.getElementById('log-body');
    tbody.innerHTML = '';
    d.logs.forEach(addLogRow);
  } catch {}
}

async function fetchNotesCount() {
  try {
    const res = await fetch('/api/graph');
    const d = await res.json();
    document.getElementById('notes-value').textContent = d.nodes ? d.nodes.length : 0;
  } catch {}
}

async function triggerSync() {
  const btn = document.getElementById('sync-btn');
  btn.disabled = true; btn.innerHTML = 'Syncing...';
  try { await fetch('/api/sync', { method: 'POST' }); toast('Sync complete'); } catch { toast('Sync failed', true); }
  setTimeout(() => { btn.disabled = false; btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M21 2v6h-6M3 22v-6h6"/><path d="M21 8a10 10 0 0 0-17.3-4.7M3 16a10 10 0 0 0 17.3 4.7"/></svg> Sync Now'; }, 2000);
}

// ─── Config ─────────────────────────────────────────
async function loadConfigToUI() {
  try {
    const res = await fetch('/api/config');
    const cfg = await res.json();
    currentConfig = cfg;

    const sel = document.getElementById('profile-select');
    if (cfg.profiles && cfg.profiles.length > 0) {
      sel.innerHTML = cfg.profiles.map(p => `<option value="${p.name}" ${p.name === cfg.activeProfile ? 'selected' : ''}>${p.name}</option>`).join('');
      document.getElementById('profile-section').style.display = '';
      const active = cfg.profiles.find(p => p.name === cfg.activeProfile);
      if (active && active.peers[0]) {
        document.getElementById('cfg-peer-id').value = active.peers[0].id || '';
        document.getElementById('cfg-host').value = active.peers[0].host || '';
        document.getElementById('cfg-port').value = active.peers[0].port || '';
      }
    } else if (cfg.peers && cfg.peers[0]) {
      document.getElementById('profile-section').style.display = 'none';
      document.getElementById('cfg-peer-id').value = cfg.peers[0].id || '';
      document.getElementById('cfg-host').value = cfg.peers[0].host || '';
      document.getElementById('cfg-port').value = cfg.peers[0].port || '';
    }

    const v = cfg.vaults && cfg.vaults[0];
    if (v) {
      document.getElementById('cfg-local-path').value = v.localPath || '';
      document.getElementById('cfg-sync-to').value = v.syncTo || '';
      document.getElementById('cfg-ai-config').value = v.includeAiConfig ? 'true' : 'false';
    }
    document.getElementById('cfg-auto').value = cfg.sync?.auto ? 'true' : 'false';
    document.getElementById('cfg-interval').value = cfg.sync?.intervalSeconds || 30;
  } catch (e) { console.error('Config load failed', e); }
}

async function saveConfig() {
  const update = {};
  if (currentConfig.profiles && currentConfig.profiles.length > 0) {
    const profile = currentConfig.profiles.find(p => p.name === currentConfig.activeProfile) || currentConfig.profiles[0];
    profile.peers = [{
      id: document.getElementById('cfg-peer-id').value,
      host: document.getElementById('cfg-host').value,
      port: parseInt(document.getElementById('cfg-port').value) || 9001,
    }];
    update.profiles = currentConfig.profiles;
  } else {
    update.peers = [{
      id: document.getElementById('cfg-peer-id').value,
      host: document.getElementById('cfg-host').value,
      port: parseInt(document.getElementById('cfg-port').value) || 9001,
    }];
  }
  const v = {
    localPath: document.getElementById('cfg-local-path').value,
    syncTo: document.getElementById('cfg-sync-to').value,
    includeAiConfig: document.getElementById('cfg-ai-config').value === 'true',
  };
  if (currentConfig.vaults && currentConfig.vaults[0]) {
    Object.assign(currentConfig.vaults[0], v);
    update.vaults = currentConfig.vaults;
  } else {
    update.vaults = [v];
  }
  update.sync = {
    auto: document.getElementById('cfg-auto').value === 'true',
    intervalSeconds: parseInt(document.getElementById('cfg-interval').value) || 30,
    conflict: 'last-write-wins',
    encryption: 'none',
  };
  try {
    await fetch('/api/config', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(update) });
    toast('Config saved! Restart to apply.');
  } catch { toast('Failed to save config', true); }
}

async function switchProfile(name) {
  try {
    await fetch('/api/profile', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name }) });
    toast(`Switched to ${name}. Restart to use new peer settings.`);
    loadConfigToUI();
  } catch { toast('Failed to switch profile', true); }
}

function addProfile() {
  const name = prompt('New profile name:');
  if (!name) return;
  if (!currentConfig.profiles) currentConfig.profiles = [];
  currentConfig.profiles.push({ name, peers: [{ id: name, host: '', port: 9001 }] });
  currentConfig.activeProfile = name;
  saveConfig().then(() => loadConfigToUI());
}

// ─── Force Graph ────────────────────────────────────
async function initGraph() {
  // Cancel previous animation
  if (graphAnimId) { cancelAnimationFrame(graphAnimId); graphAnimId = null; }
  // Reset canvas container
  const container = document.getElementById('graph-container');
  container.innerHTML = '<canvas id="graph-canvas"></canvas><div class="graph-tooltip" id="graph-tooltip"></div>';
  try {
    const res = await fetch('/api/graph');
    graphData = await res.json();
  } catch (e) { console.error('Graph fetch failed', e); toast('Failed to load graph', true); return; }
  if (!graphData.nodes || graphData.nodes.length === 0) {
    showGraphEmpty();
    return;
  }
  runForceGraph();
}

function showGraphEmpty() {
  const container = document.getElementById('graph-container');
  container.innerHTML = `<div class="graph-empty">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 6a2 2 0 1 0 0-4 2 2 0 0 0 0 4zM6 12a2 2 0 1 0 0-4 2 2 0 0 0 0 4z"/><path d="M18 6h-3a5 5 0 0 0-5 5v2"/><path d="M18 22a2 2 0 1 0 0-4 2 2 0 0 0 0 4z"/></svg>
    <div>No notes or wiki-links found in your vault.</div>
    <div style="font-size:12px;">Check that your vault path is set in Settings and notes contain [[links]].</div>
  </div>`;
}

function runForceGraph() {
  const container = document.getElementById('graph-container');
  const canvas = document.getElementById('graph-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const tooltip = document.getElementById('graph-tooltip');

  let W, H;
  function resize() {
    const rect = container.getBoundingClientRect();
    W = rect.width; H = rect.height;
    canvas.width = W; canvas.height = H;
    draw();
  }
  resize();
  window.addEventListener('resize', resize);

  const { nodes, links } = graphData;
  const nodeMap = new Map();
  const adj = new Map();
  const cx = W / 2, cy = H / 2;

  // Build adjacency for highlighting
  for (const n of nodes) adj.set(n.id, new Set());
  for (const link of links) {
    adj.get(link.source).add(link.target);
    adj.get(link.target).add(link.source);
  }

  const r = Math.min(W, H) * 0.35;
  nodes.forEach((n, i) => {
    const angle = (2 * Math.PI * i) / nodes.length;
    n.x = cx + r * Math.cos(angle);
    n.y = cy + r * Math.sin(angle);
    n.vx = 0; n.vy = 0;
    n.radius = Math.max(5, Math.min(10, 50 / Math.sqrt(nodes.length)));
    nodeMap.set(n.id, n);
  });

  let dragNode = null;
  let hoverNode = null;
  let mouseX = 0, mouseY = 0;
  let neighborSet = new Set();

  canvas.onmousedown = e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    for (const n of nodes) {
      if ((mx - n.x) ** 2 + (my - n.y) ** 2 < (n.radius + 10) ** 2) { dragNode = n; break; }
    }
  };
  canvas.onmousemove = e => {
    const rect = canvas.getBoundingClientRect();
    mouseX = e.clientX - rect.left; mouseY = e.clientY - rect.top;
    if (dragNode) { dragNode.x = mouseX; dragNode.y = mouseY; return; }
    let hit = null;
    for (const n of nodes) {
      if ((mouseX - n.x) ** 2 + (mouseY - n.y) ** 2 < (n.radius + 10) ** 2) { hit = n; break; }
    }
    hoverNode = hit;
    neighborSet = hit ? (adj.get(hit.id) || new Set()) : new Set();
    tooltip.style.display = hit ? 'block' : 'none';
    if (hit) {
      const connected = neighborSet.size;
      tooltip.textContent = hit.name + (connected ? ` (${connected} links)` : '');
      tooltip.style.left = Math.min(mouseX + 14, W - 180) + 'px';
      tooltip.style.top = Math.max(4, mouseY - 40) + 'px';
    }
  };
  canvas.onmouseup = () => { dragNode = null; };
  canvas.onmouseleave = () => { dragNode = null; hoverNode = null; neighborSet = new Set(); tooltip.style.display = 'none'; };

  function simulate() {
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const a = nodes[i], b = nodes[j];
        let dx = b.x - a.x, dy = b.y - a.y;
        let dist = Math.sqrt(dx * dx + dy * dy) || 1;
        const force = 8000 / (dist * dist);
        a.vx -= force * (dx / dist); a.vy -= force * (dy / dist);
        b.vx += force * (dx / dist); b.vy += force * (dy / dist);
      }
    }
    for (const link of links) {
      const a = nodeMap.get(link.source), b = nodeMap.get(link.target);
      if (!a || !b) continue;
      const dx = b.x - a.x, dy = b.y - a.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      const force = (dist - 130) * 0.025;
      a.vx += force * (dx / dist); a.vy += force * (dy / dist);
      b.vx -= force * (dx / dist); b.vy -= force * (dy / dist);
    }
    for (const n of nodes) {
      n.vx += (cx - n.x) * 0.001;
      n.vy += (cy - n.y) * 0.001;
    }
    let totalVel = 0;
    for (const n of nodes) {
      if (n === dragNode) continue;
      n.vx *= 0.88; n.vy *= 0.88;
      n.x += n.vx; n.y += n.vy;
      totalVel += Math.abs(n.vx) + Math.abs(n.vy);
      n.x = Math.max(15, Math.min(W - 15, n.x));
      n.y = Math.max(15, Math.min(H - 15, n.y));
    }
    draw();
    if (totalVel > 0.2 || dragNode) graphAnimId = requestAnimationFrame(simulate);
    else graphAnimId = null;
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // dimmed background when hovering
    if (hoverNode && !dragNode) {
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fillRect(0, 0, W, H);
    }

    // Links
    for (const link of links) {
      const a = nodeMap.get(link.source), b = nodeMap.get(link.target);
      if (!a || !b) continue;
      const isHighlighted = hoverNode && (link.source === hoverNode.id || link.target === hoverNode.id);
      if (hoverNode && !isHighlighted && !dragNode) continue;
      ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
      if (isHighlighted) {
        ctx.shadowColor = 'rgba(88,166,255,0.3)';
        ctx.shadowBlur = 6;
        ctx.strokeStyle = '#58a6ff';
        ctx.lineWidth = 2;
      } else {
        ctx.shadowBlur = 0;
        ctx.strokeStyle = '#30363d';
        ctx.lineWidth = 1;
      }
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    // Nodes
    for (const n of nodes) {
      const isHovered = n === hoverNode;
      const isNeighbor = neighborSet.has(n.id);

      if (hoverNode && !isHovered && !isNeighbor && !dragNode) {
        // Dimmed node
        ctx.beginPath(); ctx.arc(n.x, n.y, n.radius, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(48,54,61,0.4)';
        ctx.fill();
        continue;
      }

      // Glow for hovered
      if (isHovered) {
        ctx.shadowColor = 'rgba(88,166,255,0.5)';
        ctx.shadowBlur = 20;
      }
      // Gradient fill
      const grad = ctx.createRadialGradient(n.x - 2, n.y - 2, 0, n.x, n.y, n.radius + 2);
      if (isHovered) {
        grad.addColorStop(0, '#79c0ff');
        grad.addColorStop(1, '#58a6ff');
      } else if (isNeighbor) {
        grad.addColorStop(0, '#58a6ff');
        grad.addColorStop(1, '#1f4a8a');
      } else {
        grad.addColorStop(0, '#60a0f0');
        grad.addColorStop(1, '#2d5a9a');
      }
      ctx.beginPath(); ctx.arc(n.x, n.y, n.radius + (isHovered ? 2 : 0), 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.shadowBlur = 0;

      // Label
      ctx.font = isHovered ? 'bold 12px -apple-system, sans-serif' : '11px -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillStyle = isHovered ? '#ffffff' : (isNeighbor ? '#e1e4e8' : '#8b949e');
      ctx.fillText(n.name, n.x, n.y + n.radius + 16);
    }
  }

  graphAnimId = requestAnimationFrame(simulate);
}

// ─── Init ───────────────────────────────────────────
fetchStatus();
fetchNotesCount();
setInterval(fetchStatus, 3000);
connectWs();
</script>
